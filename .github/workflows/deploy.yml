name: CI/CD Pipeline

on:
  push:
    branches:
      - main

jobs:
  deploy:
    name: Deploy Aplicacao Publica
    runs-on: [self-hosted, Linux, X64, auroraapp-prod]
    defaults:
      run:
        shell: bash

    steps:
      - name: Checkout do codigo
        uses: actions/checkout@v4

      - name: Conferir Docker no runner Ubuntu
        run: |
          docker --version
          docker compose version

      - name: Validar Docker Compose
        run: docker compose -f docker-compose.yml config

      - name: Executar deploy com Docker Compose
        run: |
          echo "Iniciando deploy completo com Docker Compose..."
          docker compose -f docker-compose.yml pull --ignore-buildable || true
          docker compose -f docker-compose.yml up -d --build --remove-orphans
          docker compose -f docker-compose.yml ps
          echo "Deploy realizado com sucesso."
